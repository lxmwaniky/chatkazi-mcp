name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - run: pnpm run build
